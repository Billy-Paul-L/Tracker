  <script>
    window.storage = {
      set: async (key, value) => { localStorage.setItem(key, value); return { key, value }; },
      get: async (key) => {
        const value = localStorage.getItem(key);
        if (value === null) throw new Error('Key not found: ' + key);
        return { key, value };
      },
      delete: async (key) => { localStorage.removeItem(key); return { key, deleted: true }; },
      list: async (prefix) => {
        prefix = prefix || '';
        const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
        return { keys, prefix };
      }
    };
  </script>

const getWeekKey = (offset=0) => {
  const d=new Date(), mon=new Date(d);
  mon.setHours(0,0,0,0);
  mon.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1)-offset*7);
  return `week_${mon.getFullYear()}_${mon.getMonth()+1}_${mon.getDate()}`;
};
const getDayKey = () => { const d=new Date(); return `day_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`; };
const getYesterdayKey = () => { const d=new Date(); d.setDate(d.getDate()-1); return `day_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`; };

const computeScores = (checks={}) => {
  let ok=0,tot=0; const pillars={};
  PILLARS.forEach(p=>{
    let po=0,pt=0;
    DAYS.forEach((_,d)=>{
      if(p.id==="sport"){
        pt++;tot++;
        if(p.types.some(t=>!!checks[`${d}-sport-${t}`])){po++;ok++;}
      } else {
        p.slots.forEach(s=>{pt++;tot++;if(!!checks[`${d}-${p.id}-${s}`]){po++;ok++;}});
      }
    });
    pillars[p.id]=pt?Math.round(po/pt*100):0;
  });
  return {global:tot?Math.round(ok/tot*100):0,pillars};
};

const Confetti = ({ active }) => {
  const [particles, setParticles] = useState([]);
  useEffect(() => {
    if (!active) return;
    const colors = ["#D97706","#16A34A","#2563EB","#7C3AED","#EA580C","#E11D48","#0891B2"];
    const p = Array.from({length:60},(_,i)=>({
      id:i, x:Math.random()*100, delay:Math.random()*0.5,
      color:colors[Math.floor(Math.random()*colors.length)],
      size:6+Math.random()*6, rot:Math.random()*360,
      vx:(Math.random()-0.5)*4, dur:1.5+Math.random()*1,
    }));
    setParticles(p);
    const t = setTimeout(()=>setParticles([]),2500);
    return ()=>clearTimeout(t);
  },[active]);
  if(!particles.length) return null;
  return(
    <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:999,overflow:"hidden"}}>
      <style>{`
        @keyframes fall {
          0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
          100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
        }
      `}</style>
      {particles.map(p=>(
        <div key={p.id} style={{
          position:"absolute", left:`${p.x}%`, top:0,
          width:p.size, height:p.size,
          background:p.color, borderRadius:p.id%3===0?"50%":p.id%3===1?"2px":"0",
          animation:`fall ${p.dur}s ease-in ${p.delay}s forwards`,
        }}/>
      ))}
    </div>
  );
};

// ── Weight Curve ───────────────────────────────────────────────
const WeightCurve = ({ weights, startWeight, target=82 }) => {
  const entries = DAYS.map((d,i)=>({ day:d, val:weights[d]||null, i })).filter(e=>e.val!==null);
  if(entries.length < 1) return(
    <div style={{textAlign:"center",padding:"20px 0",color:C.faint,fontSize:12}}>
      Logue ton poids chaque jour pour voir la courbe 📈
    </div>
  );
  const allVals = [startWeight, target, ...entries.map(e=>e.val)];
  const minV = Math.floor(Math.min(...allVals)-1);
  const maxV = Math.ceil(Math.max(...allVals)+1);
  const W=300, H=120, padL=36, padR=12, padT=12, padB=24;
  const iW=W-padL-padR, iH=H-padT-padB;
  const xPos = i => padL + (i/6)*iW;
  const yPos = v => padT + iH - ((v-minV)/(maxV-minV))*iH;

  // Ligne de progression
  const points = entries.map(e=>`${xPos(e.i)},${yPos(e.val)}`).join(" ");
  const pathD = entries.map((e,i)=>i===0?`M${xPos(e.i)},${yPos(e.val)}`:`L${xPos(e.i)},${yPos(e.val)}`).join(" ");
  const areaD = entries.length>1 ? `${pathD} L${xPos(entries.at(-1).i)},${padT+iH} L${xPos(entries[0].i)},${padT+iH} Z` : null;
  const yTarget = yPos(target);
  const yStart  = yPos(startWeight);

  return(
    <div style={{overflowX:"auto"}}>
      <svg width={W} height={H} style={{display:"block",margin:"0 auto"}}>
        {/* Ligne cible 82kg */}
        <line x1={padL} y1={yTarget} x2={W-padR} y2={yTarget} stroke={C.good} strokeWidth="1" strokeDasharray="4 3" opacity="0.6"/>
        <text x={W-padR+2} y={yTarget+4} fontSize="8" fill={C.good} opacity="0.8">{target}</text>
        {/* Ligne départ */}
        <line x1={padL} y1={yStart} x2={W-padR} y2={yStart} stroke={C.faint} strokeWidth="1" strokeDasharray="3 3" opacity="0.4"/>
        {/* Zone remplie */}
        {areaD&&<path d={areaD} fill={C.nutri} opacity="0.07"/>}
        {/* Courbe */}
        {entries.length>1&&<path d={pathD} fill="none" stroke={C.nutri} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
        {/* Points */}
        {entries.map(e=>(
          <g key={e.i}>
            <circle cx={xPos(e.i)} cy={yPos(e.val)} r="4" fill={e.val<=target?C.good:C.nutri} stroke="#fff" strokeWidth="1.5"/>
            <text x={xPos(e.i)} y={yPos(e.val)-8} fontSize="9" fill={C.muted} textAnchor="middle">{e.val}</text>
          </g>
        ))}
        {/* Axe Y labels */}
        {[minV, Math.round((minV+maxV)/2), maxV].map(v=>(
          <text key={v} x={padL-4} y={yPos(v)+4} fontSize="8" fill={C.faint} textAnchor="end">{v}</text>
        ))}
        {/* Axe X labels */}
        {DAYS.map((d,i)=>(
          <text key={d} x={xPos(i)} y={H-6} fontSize="8" fill={C.faint} textAnchor="middle">{d}</text>
        ))}
      </svg>
    </div>
  );
};

    </div>
  </>);
};

// ── TODO Component ─────────────────────────────────────────────
const TodoList=({todos,setTodos})=>{
  const [newTitle,setNewTitle]=useState("");
  const [newDate,setNewDate]=useState("");
  const inputSt={background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 12px",color:C.text,fontFamily:"inherit",fontSize:12,outline:"none"};

  const add=()=>{
    if(!newTitle.trim()) return;
    const todo={id:Date.now(),title:newTitle.trim(),date:newDate,done:false};
    setTodos(p=>[...p,todo]);
    setNewTitle(""); setNewDate("");
  };
  const toggle=id=>setTodos(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const remove=id=>setTodos(p=>p.filter(t=>t.id!==id));

  const sorted=[...todos].sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(a.date&&b.date) return a.date.localeCompare(b.date);
    if(a.date) return -1; if(b.date) return 1;
    return 0;
  });

  const today=new Date().toISOString().split("T")[0];
  const isLate=d=>d&&d<today;
  const isSoon=d=>d&&d>=today&&d<=new Date(Date.now()+3*86400000).toISOString().split("T")[0];

  return(
    <Card>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:700}}>🎯 Objectifs & To-Do</div>
        <span style={{fontSize:11,color:C.faint}}>{todos.filter(t=>!t.done).length} en cours</span>
      </div>
      {/* Ajout */}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14,padding:"12px",background:C.surface2,borderRadius:12,border:`1px solid ${C.border}`}}>
        <input placeholder="Nouvel objectif..." value={newTitle} onChange={e=>setNewTitle(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&add()}
          style={{...inputSt,width:"100%",boxSizing:"border-box"}}/>
        <div style={{display:"flex",gap:8}}>
          <input type="date" value={newDate} onChange={e=>setNewDate(e.target.value)}
            style={{...inputSt,flex:1}}/>
          <button onClick={add} style={{background:C.accent,border:"none",borderRadius:10,padding:"9px 16px",color:"#fff",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>+ Ajouter</button>
        </div>
      </div>
      {/* Liste */}
      {sorted.length===0?(
        <div style={{textAlign:"center",padding:"20px 0",color:C.faint,fontSize:12}}>Aucun objectif pour l'instant 🌱</div>
      ):sorted.map(t=>{
        const late=isLate(t.date)&&!t.done;
        const soon=isSoon(t.date)&&!t.done;
        return(
          <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
            <button onClick={()=>toggle(t.id)} style={{width:22,height:22,borderRadius:6,border:`1.5px solid ${t.done?C.good:C.border}`,background:t.done?C.good:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
              {t.done&&<span style={{color:"#fff",fontSize:12}}>✓</span>}
            </button>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:t.done?C.faint:C.text,textDecoration:t.done?"line-through":"none",lineHeight:1.4}}>{t.title}</div>
              {t.date&&(
                <div style={{fontSize:11,marginTop:3,color:late?C.danger:soon?C.warn:C.faint,fontWeight:late||soon?600:400}}>
                  {late?"⚠ ":soon?"⏰ ":""}{new Date(t.date+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})}
                </div>
              )}
            </div>
            <button onClick={()=>remove(t.id)} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:16,padding:"0 4px",lineHeight:1}}>×</button>
          </div>
        );
      })}
    </Card>
  );
};

// ── App ────────────────────────────────────────────────────────
function App() {
  const [loaded,setLoaded]           = useState(false);
  const [saving,setSaving]           = useState(false);
  const [tab,setTab]                 = useState("tracker");
  const [checks,setChecks]           = useState({});
  const [activeDay,setActiveDay]     = useState(new Date().getDay()===0?6:new Date().getDay()-1);
  const [weights,setWeights]         = useState({});
  const [startWeight,setStartWeight] = useState(null);
  const [savings,setSavings]         = useState({target:500,saved:0});
  const [newWeight,setNewWeight]     = useState("");
  const [newSaving,setNewSaving]     = useState("");
  const [quote]                      = useState(QUOTES[Math.floor(Math.random()*QUOTES.length)]);
  const [nutriTab,setNutriTab]       = useState("plan");
  const [selOpts,setSelOpts]         = useState({matin:0,midi:0,collation:0,soir:0});
  const [doneM,setDoneM]             = useState({});
  const [gymDay,setGymDay]           = useState(false);
  const [history,setHistory]             = useState([]);
  const [newWeekBanner,setNewWeekBanner] = useState(false);
  const [todos,setTodos]                 = useState([]);
  const [streaks,setStreaks]             = useState({});
  const [confetti,setConfetti]           = useState(false);
  const wk=getWeekKey(), dk=getDayKey(), yk=getYesterdayKey();

  useEffect(()=>{
    (async()=>{
      const [ch,wt,sw,sav,so,dm,lastWk,td,savedStreaks,yesterdayDone]=await Promise.all([
        load(`${wk}_checks`,{}),load("weights",{}),load("startWeight",null),
        load("savings",{target:500,saved:0}),load("selOpts",{matin:0,midi:0,collation:0,soir:0}),
        load(`doneM_${dk}`,{}),load("lastWeekKey",null),load("todos",[]),
        load("streaks",{}), load(`donePillars_${yk}`,{}),
      ]);
      setChecks(ch);setWeights(wt);setStartWeight(sw);
      setSavings(sav);setSelOpts(so);setDoneM(dm);setTodos(td);

      // Recalcule les streaks au chargement
      // Si hier était complété pour un pilier → le streak continue, sinon reset
      const initStreaks = {};
      PILLARS.forEach(p=>{
        const prev = savedStreaks[p.id] || {current:0, best:0};
        const doneYesterday = !!yesterdayDone[p.id];
        const current = doneYesterday ? prev.current : 0;
        initStreaks[p.id] = {current, best: Math.max(prev.best, current)};
      });
      setStreaks(initStreaks);

      if(lastWk&&lastWk!==wk) setNewWeekBanner(true);
      await save("lastWeekKey",wk);
      const WEEKS=6;
      const labels=["Sem. −5","Sem. −4","Sem. −3","Sem. −2","Sem. −1","Cette sem."];
      const histData=await Promise.all(
        Array.from({length:WEEKS},(_,i)=>WEEKS-1-i).map(async(offset,idx)=>{
          const key=getWeekKey(offset);
          const c=offset===0?ch:await load(`${key}_checks`,{});
          return{label:labels[idx],...computeScores(c),key};
        })
      );
      setHistory(histData);setLoaded(true);
    })();
  },[]);

  useEffect(()=>{if(!loaded)return;setHistory(prev=>prev.map(w=>w.key===wk?{...w,...computeScores(checks)}:w));},[checks,loaded]);

  // Confetti quand un pilier est complété à 100% aujourd'hui
  useEffect(()=>{
    if(!loaded) return;
    const today = new Date().getDay()===0?6:new Date().getDay()-1;
    const allDone = PILLARS.every(p=>getPillarDoneOnDay(p.id,today));
    if(allDone){ setConfetti(true); setTimeout(()=>setConfetti(false),2600); }
  },[checks,loaded]);
  useEffect(()=>{
    if(!loaded) return;
    const today = new Date().getDay()===0?6:new Date().getDay()-1;
    const donePillars = {};
    const newStreaks = {};
    PILLARS.forEach(p=>{
      const doneToday = getPillarDoneOnDay(p.id, today);
      donePillars[p.id] = doneToday;
      const prev = streaks[p.id] || {current:0, best:0};
      const current = doneToday ? prev.current + (prev._lastDay === dk ? 0 : 1) : prev.current;
      newStreaks[p.id] = {current, best: Math.max(prev.best, current), _lastDay: doneToday ? dk : prev._lastDay};
    });
    // Ne persist que si changement réel
    const changed = PILLARS.some(p=>(streaks[p.id]?.current||0) !== newStreaks[p.id].current);
    if(changed){
      setStreaks(newStreaks);
      persist([["streaks", newStreaks], [`donePillars_${dk}`, donePillars]]);
    }
  },[checks, loaded]);

  const persist=useCallback(async(updates)=>{setSaving(true);await Promise.all(updates.map(([k,v])=>save(k,v)));setTimeout(()=>setSaving(false),600);},[]);
  const setAndSave=(setter,key)=>fn=>setter(prev=>{const next=fn(prev);persist([[key,next]]);return next;});
  const setC  =setAndSave(setChecks,`${wk}_checks`);
  const setW  =setAndSave(setWeights,"weights");
  const setSv =setAndSave(setSavings,"savings");
  const setSo =setAndSave(setSelOpts,"selOpts");
  const setDm =setAndSave(setDoneM,`doneM_${dk}`);
  const setSW =v=>{setStartWeight(v);persist([["startWeight",v]]);};

  // Todos avec persistence
  const setTodosP=fn=>{setTodos(prev=>{const next=typeof fn==="function"?fn(prev):fn;persist([["todos",next]]);return next;});};

  const toggle=(d,pid,slot)=>{if(pid==="sport")return;const k=`${d}-${pid}-${slot}`;setC(p=>({...p,[k]:!p[k]}));};
  const toggleSport=(d,type)=>{const k=`${d}-sport-${type}`;setC(p=>({...p,[k]:!p[k]}));};
  const chkSport=(d,type)=>!!checks[`${d}-sport-${type}`];
  const sportCount=d=>PILLARS.find(p=>p.id==="sport").types.filter(t=>chkSport(d,t)).length;
  const chk=(d,pid,slot)=>!!checks[`${d}-${pid}-${slot}`];
  const pCount=pid=>{
    if(pid==="sport"){let n=0;DAYS.forEach((_,d)=>{if(sportCount(d)>0)n++;});return n;}
    let n=0;DAYS.forEach((_,d)=>PILLARS.find(p=>p.id===pid).slots.forEach(s=>{if(chk(d,pid,s))n++;}));return n;
  };
  const dayScore=d=>{
    let ok=0,tot=0;
    PILLARS.forEach(p=>{
      if(p.id==="sport"){tot++;if(sportCount(d)>0)ok++;}
      else p.slots.forEach(s=>{tot++;if(chk(d,p.id,s))ok++;});
    });
    return tot?Math.round(ok/tot*100):0;
  };
  const gScore=()=>{let ok=0,tot=0;DAYS.forEach((_,d)=>{tot+=100;ok+=dayScore(d);});return tot?Math.round(ok/tot*100):0;};

  const getPillarDoneOnDay = (pid, d) => {
    if(pid==="sport") return sportCount(d)>0;
    return PILLARS.find(p=>p.id===pid).slots.every(s=>chk(d,pid,s));
  };
  const getStreak  = (pid) => streaks[pid]?.current || 0;
  const getBestStreak = (pid) => streaks[pid]?.best || 0;
  const pillarOf=id=>PILLARS.find(p=>p.id===id);
  const sCol=s=>s>=80?C.good:s>=50?C.warn:s>=20?C.danger:C.faint;
  const toggleOpt=key=>setSo(p=>({...p,[key]:(p[key]+1)%MEALS[key].options.length}));
  const mealTot=key=>MEALS[key].options[selOpts[key]].aliments.reduce((a,x)=>({kcal:a.kcal+x.kcal,p:a.p+x.p,g:a.g+x.g,l:a.l+x.l}),{kcal:0,p:0,g:0,l:0});
  const dayTot=()=>{let r={kcal:0,p:0,g:0,l:0};Object.keys(MEALS).forEach(k=>{const t=mealTot(k);r.kcal+=t.kcal;r.p+=t.p;r.g+=t.g;r.l+=t.l;});if(gymDay){r.kcal+=150;r.g+=35;}return r;};

  const gs=gScore(),dt=dayTot(),deficit=2300-dt.kcal;
  const inputSt={flex:1,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",color:C.text,fontFamily:"inherit",fontSize:13,outline:"none"};
  const btnSt=color=>({background:color,border:"none",borderRadius:10,padding:"10px 18px",color:"#fff",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:12});
  const ghostBtn={background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 14px",color:C.faint,cursor:"pointer",fontFamily:"inherit",fontSize:11};
  const TABS=[{id:"tracker",label:"Tracker"},{id:"planning",label:"Planning"},{id:"nutrition",label:"Nutrition"},{id:"stats",label:"Stats"}];

  const slotLabel=s=>s==="lu"?"Lu ✓":s==="fait"?"Fait ✓":s==="done"?"💎 Tirelire remplie":s==="no-cig"?"🚭 Sans clope":s==="no-alc"?"🍷 Sans alcool":s.charAt(0).toUpperCase()+s.slice(1);

  if(!loaded) return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"system-ui,sans-serif",color:C.muted,flexDirection:"column",gap:14}}>
      <div style={{width:32,height:32,border:`2px solid ${C.border}`,borderTop:`2px solid ${C.accent}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{fontSize:13}}>Chargement...</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"system-ui,-apple-system,sans-serif",color:C.text}}>
      {/* HEADER */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 0",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,borderRadius:10,background:C.accentSoft,border:`1px solid ${C.accent}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚡</div>
            <div>
              <div style={{fontSize:15,fontWeight:700,letterSpacing:-0.3}}>Mon Système</div>
              <div style={{fontSize:11,color:C.faint}}>Semaine en cours</div>
            </div>
            <SaveDot saving={saving}/>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:28,fontWeight:800,color:sCol(gs),lineHeight:1}}>{gs}<span style={{fontSize:14,fontWeight:500,color:C.faint}}>%</span></div>
            <div style={{fontSize:10,color:C.faint}}>score global</div>
          </div>
        </div>
        <div style={{height:2,background:C.border,borderRadius:2,marginBottom:14,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${gs}%`,background:`linear-gradient(90deg,${C.accent},${C.warn})`,borderRadius:2,transition:"width 0.4s"}}/>
        </div>
        <div style={{display:"flex",gap:2}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"9px 4px",fontSize:12,fontWeight:tab===t.id?600:400,color:tab===t.id?C.text:C.faint,borderBottom:tab===t.id?`2px solid ${C.accent}`:"2px solid transparent",cursor:"pointer",fontFamily:"inherit",marginBottom:-1,transition:"all 0.15s"}}>{t.label}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 16px 80px",maxWidth:480,margin:"0 auto"}}>
        <Confetti active={confetti}/>
      {newWeekBanner&&(
          <div style={{background:`linear-gradient(135deg,${C.accentSoft},${C.good}15)`,border:`1px solid ${C.accent}40`,borderRadius:14,padding:"14px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>🎉 Nouvelle semaine !</div>
              <div style={{fontSize:11,color:C.muted,lineHeight:1.5}}>Tes habitudes ont été remises à zéro. Repas et scores archivés dans l'historique.</div>

                      ))}
                      <span style={{fontSize:10,color:C.faint,alignSelf:"center"}}>· {p.types.filter(t=>chkSport(activeDay,t)).length} séance{p.types.filter(t=>chkSport(activeDay,t)).length>1?"s":""} aujourd'hui</span>
                    </div>
                  )}
                </>
              ):(
                <div style={{display:"flex",gap:8,flexWrap:p.slots.length>3?"wrap":"nowrap"}}>
                  {p.slots.map(slot=>{
                    const on=chk(activeDay,p.id,slot);
                    return(
                      <button key={slot} onClick={()=>toggle(activeDay,p.id,slot)} style={{flex:1,minWidth:p.slots.length>3?"45%":undefined,padding:"11px 8px",background:on?p.color:C.surface2,border:`1px solid ${on?p.color:C.border}`,borderRadius:10,cursor:"pointer",color:on?"#fff":C.muted,fontFamily:"inherit",fontSize:12,fontWeight:on?600:400,transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        <span style={{fontSize:14}}>{on?"✓":"○"}</span>
                        {slotLabel(slot)}
                      </button>
                    );
                  })}
                </div>
              )}
              <div style={{fontSize:11,color:C.faint,marginTop:10,lineHeight:1.5}}>💡 {p.tip}</div>
            </Card>
          ))}
        </>)}

        {/* ── PLANNING ── */}
        {tab==="planning"&&<PlanningTab pillarOf={pillarOf}/>}

        {/* ── NUTRITION ── */}
        {tab==="nutrition"&&(<>
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontSize:11,color:C.faint,marginBottom:2}}>Objectif −1 kg / semaine</div>
                <div style={{fontSize:17,fontWeight:700}}>Plan du jour</div>
              </div>
              <button onClick={()=>setGymDay(g=>!g)} style={{background:gymDay?`${C.sport}15`:C.surface2,border:`1px solid ${gymDay?C.sport:C.border}`,borderRadius:20,padding:"7px 14px",color:gymDay?C.sport:C.muted,fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:11}}>{gymDay?"⚡ Salle +150":"Jour de salle ?"}</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {[
                {label:"Kcal",val:dt.kcal,target:MACROS_TARGET.kcal,color:C.warn},
                {label:"Prot.",val:dt.p,target:MACROS_TARGET.proteines,color:C.nutri},
                {label:"Gluc.",val:dt.g,target:MACROS_TARGET.glucides,color:C.sport},
                {label:"Lip.", val:dt.l,target:MACROS_TARGET.lipides, color:C.lecture},
              ].map(m=>{
                const over=m.val>m.target*1.05;
                return(
                  <div key={m.label} style={{flex:1,background:C.surface2,borderRadius:10,padding:"10px 8px",border:`1px solid ${C.border}`}}>
                    <div style={{fontSize:14,fontWeight:700,color:over?C.danger:m.color,marginBottom:4}}>{m.val}</div>
                    <div style={{height:3,background:C.border,borderRadius:2,overflow:"hidden",marginBottom:6}}>
                      <div style={{height:"100%",width:`${Math.min(m.val/m.target,1)*100}%`,background:over?C.danger:m.color,borderRadius:2}}/>
                    </div>
                    <div style={{fontSize:9,color:C.faint}}>{m.label}/{m.target}</div>
                  </div>
                );
              })}
            </div>
            <div style={{padding:"10px 14px",background:deficit>=500?`${C.good}12`:`${C.warn}12`,border:`1px solid ${deficit>=500?C.good:C.warn}35`,borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,color:C.muted}}>Déficit estimé</span>
              <span style={{fontSize:14,fontWeight:700,color:deficit>=500?C.good:C.warn}}>−{deficit} kcal {deficit>=500?"✓":"⚠"}</span>
            </div>
          </Card>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            {[{id:"plan",label:"Plan repas"},{id:"regles",label:"Règles clés"},{id:"abaque",label:"Abaque 🔍"}].map(t=>(
              <button key={t.id} onClick={()=>setNutriTab(t.id)} style={{flex:1,padding:"10px 0",background:nutriTab===t.id?C.nutri:C.surface,border:`1px solid ${nutriTab===t.id?C.nutri:C.border}`,borderRadius:10,color:nutriTab===t.id?"#fff":C.muted,fontFamily:"inherit",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all 0.15s"}}>{t.label}</button>
            ))}
          </div>
          {nutriTab==="plan"&&Object.entries(MEALS).map(([key,meal])=>{
            const opts=meal.options, cur=selOpts[key], opt=opts[cur], mt=mealTot(key), done=doneM[key];
            return(
              <div key={key} style={{background:C.surface,border:`1px solid ${done?meal.color+"50":C.border}`,borderRadius:16,marginBottom:12,overflow:"hidden",opacity:done?0.6:1,transition:"all 0.2s"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 15px",borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontSize:20}}>{meal.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                      <Tag color={meal.color}>{meal.label}</Tag>
                      <span style={{fontSize:10,color:C.faint}}>{meal.time}</span>
                    </div>
                    <div style={{fontSize:11,color:C.muted}}>{mt.kcal} kcal · {mt.p}g prot</div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    {opts.length>1&&(
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <button onClick={()=>setSo(p=>({...p,[key]:(p[key]-1+opts.length)%opts.length}))} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,width:26,height:26,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:12}}>‹</button>
                        <span style={{fontSize:10,color:C.faint,minWidth:28,textAlign:"center"}}>{cur+1}/{opts.length}</span>
                        <button onClick={()=>toggleOpt(key)} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,width:26,height:26,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:12}}>›</button>
                      </div>
                    )}
                    <button onClick={()=>setDm(p=>({...p,[key]:!p[key]}))} style={{width:32,height:32,borderRadius:8,background:done?meal.color:C.surface2,border:`1px solid ${done?meal.color:C.border}`,color:done?"#fff":C.faint,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{done?"✓":"○"}</button>
                  </div>
                </div>
                <div style={{padding:"7px 15px 5px",background:C.surface2,borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontSize:10,color:C.faint,fontStyle:"italic"}}>{opt.nom}</span>
                </div>
                {opt.aliments.map((a,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 15px",borderBottom:i<opt.aliments.length-1?`1px solid ${C.border}`:"none"}}>
                    <div>
                      <div style={{fontSize:13}}>{a.nom}</div>
                      <div style={{fontSize:11,color:C.faint}}>{a.qte}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:13,fontWeight:600,color:meal.color}}>{a.kcal} kcal</div>
                      <div style={{fontSize:10,color:C.faint}}>P{a.p} G{a.g} L{a.l}</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          })}
          {nutriTab==="abaque"&&(
            <Card>
              <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>📊 Abaque nutritionnel</div>
              <div style={{fontSize:11,color:C.faint,marginBottom:14}}>55 ingrédients · recherche + filtres + tri</div>
              <NutriAbaque/>
            </Card>
          )}
          {nutriTab==="regles"&&(<>
            {/* Rôles des macros */}
            <div style={{fontSize:13,fontWeight:700,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
              <span>⚗️</span> Rôle des macronutriments
            </div>
            {MACRO_ROLES.map(m=>(
              <Card key={m.macro} style={{marginBottom:10,borderLeft:`3px solid ${m.color}`}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{width:38,height:38,borderRadius:10,background:`${m.color}15`,border:`1px solid ${m.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{m.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:m.color}}>{m.macro}</div>
                    <div style={{fontSize:10,color:C.faint}}>{m.kcalPg} kcal / gramme</div>
                  </div>
                </div>
                <div style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:10}}>{m.role}</div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:10,fontWeight:600,color:C.text,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Sources principales</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {m.sources.map(s=>(
                      <span key={s} style={{fontSize:10,color:m.color,background:`${m.color}12`,border:`1px solid ${m.color}30`,borderRadius:20,padding:"2px 9px"}}>{s}</span>
                    ))}
                  </div>
                </div>
                <div style={{fontSize:11,color:C.faint,fontStyle:"italic",borderTop:`1px solid ${C.border}`,paddingTop:8}}>💡 {m.tip}</div>
              </Card>
            ))}

            <div style={{height:1,background:C.border,margin:"16px 0"}}/>
            <div style={{fontSize:13,fontWeight:700,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
              <span>📋</span> Règles clés
            </div>
            {NUTRI_RULES.map((r,i)=>(
              <Card key={i} style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                <div style={{width:40,height:40,borderRadius:10,background:C.surface2,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{r.icon}</div>
                <div><div style={{fontSize:13,fontWeight:600,marginBottom:5}}>{r.title}</div><div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>{r.desc}</div></div>
              </Card>
            ))}
            <div style={{display:"flex",gap:10,marginTop:6}}>
              {[
                {label:"✓ Favoris",color:C.good,items:["Poulet / dinde","Œufs","Skyr","Flocons d'avoine","Riz basmati","Patate douce","Brocolis","Saumon","Thon naturel"]},
                {label:"✗ À limiter",color:C.danger,items:["Alcool","Pain blanc","Sodas","Sauces industrielles","Fromages gras","Charcuterie","Snacks transformés"]},
              ].map(col=>(
                <div key={col.label} style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
                  <div style={{fontSize:12,fontWeight:600,color:col.color,marginBottom:10}}>{col.label}</div>
                  {col.items.map((it,i)=>(
                    <div key={i} style={{fontSize:12,color:C.muted,padding:"6px 0",borderBottom:i<col.items.length-1?`1px solid ${C.border}`:"none"}}>{it}</div>
                  ))}
                </div>
              ))}
            </div>
          </>)}
        </>)}

        {/* ── STATS ── */}
        {tab==="stats"&&(<>
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:13,color:C.muted}}>Score de la semaine</div>
              <div style={{fontSize:28,fontWeight:800,color:sCol(gs)}}>{gs}<span style={{fontSize:14,fontWeight:400,color:C.faint}}>%</span></div>
            </div>
            <div style={{height:6,background:C.border,borderRadius:3,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",width:`${gs}%`,background:`linear-gradient(90deg,${sCol(gs)},${sCol(gs)}99)`,borderRadius:3,transition:"width 0.5s"}}/>
            </div>
            <div style={{fontSize:12,color:C.faint}}>{gs<30?"💤 Démarre le moteur.":gs<60?"🔥 Tu avances, pousse encore.":gs<85?"🚀 Excellente semaine, finis fort.":"🏆 Semaine de champion."}</div>
          </Card>

          <Card>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div>
                <div style={{fontSize:14,fontWeight:700}}>📈 Historique</div>
                <div style={{fontSize:11,color:C.faint,marginTop:2}}>6 dernières semaines · survole pour le détail</div>
              </div>
              {(()=>{
                const wd=history.filter(h=>h.global>0);
                if(wd.length<2) return null;
                const avg=Math.round(wd.reduce((a,h)=>a+h.global,0)/wd.length);
                const trend=wd.at(-1).global-wd.at(-2).global;
                return(
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.accent}}>{avg}%</div>
                    <div style={{fontSize:10,color:trend>=0?C.good:C.danger}}>{trend>=0?"↑":"↓"} {Math.abs(trend)}% vs sem. −1</div>
                  </div>
                );
              })()}
            </div>
            <MultiWeekChart history={history}/>
          </Card>

          {PILLARS.map(p=>{
            const cnt=pCount(p.id),pct=Math.round(Math.min(cnt/p.target,1)*100);
            return(
              <Card key={p.id}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:36,height:36,borderRadius:10,background:`${p.color}15`,border:`1px solid ${p.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{p.icon}</div>
                    <div><Tag color={p.color}>{p.label}</Tag><div style={{fontSize:10,color:C.faint,marginTop:4}}>{cnt}/{p.target} {p.unit}s</div></div>
                  </div>
                  <div style={{fontSize:22,fontWeight:800,color:pct>=80?p.color:C.faint}}>{pct}%</div>
                </div>
                <div style={{height:4,background:C.border,borderRadius:2,overflow:"hidden",marginBottom:10}}>
                  <div style={{height:"100%",width:`${pct}%`,background:p.color,borderRadius:2,transition:"width 0.5s"}}/>
                </div>
                <div style={{display:"flex",gap:5}}>
                  {DAYS.map((d,i)=>{
                    const any=p.id==="sport"?sportCount(i)>0:p.slots.some(s=>chk(i,p.id,s));
                    return(
                      <div key={d} style={{flex:1,textAlign:"center"}}>
                        <div style={{height:5,borderRadius:3,background:any?p.color:C.border,marginBottom:4}}/>
                        <div style={{fontSize:8,color:C.faint}}>{d}</div>
                      </div>
                    );
                  })}
                </div>
              </Card>
            );
          })}

          {/* To-Do */}
          <TodoList todos={todos} setTodos={setTodosP}/>

          {/* Poids */}
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:600}}>⚖️ Suivi Poids</div>
              <Tag color={C.nutri}>Objectif 82 kg</Tag>
            </div>
            {!startWeight?(
              <>
                <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Entre ton poids de départ :</div>
                <div style={{display:"flex",gap:8}}>
                  <input type="number" placeholder="Ex: 97" value={newWeight} onChange={e=>setNewWeight(e.target.value)} style={inputSt}/>
                  <button onClick={()=>{if(newWeight){setSW(parseFloat(newWeight));setNewWeight("");}}} style={btnSt(C.nutri)}>Départ</button>
                </div>
              </>
            ):(
              <>
                <div style={{display:"flex",gap:8,marginBottom:14}}>
                  {[
                    {label:"Départ",val:`${startWeight} kg`,color:C.muted},
                    {label:"Actuel",val:Object.values(weights).length>0?`${Object.values(weights).at(-1)} kg`:"—",color:C.nutri},
                    {label:"Δ Total",val:Object.values(weights).length>0?`${(Object.values(weights).at(-1)-startWeight).toFixed(1)} kg`:"—",
                      color:Object.values(weights).length>0&&Object.values(weights).at(-1)<=82?C.good:C.warn},
                  ].map(k=>(
                    <div key={k.label} style={{flex:1,background:C.surface2,borderRadius:10,padding:"10px 8px",textAlign:"center",border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:14,fontWeight:700,color:k.color}}>{k.val}</div>
                      <div style={{fontSize:9,color:C.faint,marginTop:3}}>{k.label}</div>
                    </div>
                  ))}
                </div>
                {Object.values(weights).length>0&&(()=>{
                  const cur=Object.values(weights).at(-1), ok=cur<=82;
                  const restant=(cur-82).toFixed(1);
                  return(
                    <div style={{padding:"10px 14px",background:`${ok?C.good:C.warn}12`,border:`1px solid ${ok?C.good:C.warn}35`,borderRadius:10,fontSize:12,color:ok?C.good:C.warn,marginBottom:12}}>
                      {ok?`🎯 Objectif atteint ! Tu es à ${cur} kg.`:`⚡ Plus que ${restant} kg à perdre pour atteindre 82 kg.`}
                    </div>
                  );
                })()}
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  <input type="number" placeholder="Poids du jour..." value={newWeight} onChange={e=>setNewWeight(e.target.value)} style={inputSt}/>
                  <button onClick={()=>{if(newWeight){const t=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];setW(p=>({...p,[t]:parseFloat(newWeight)}));setNewWeight("");}}} style={btnSt(C.nutri)}>Log</button>
                </div>
                <div style={{display:"flex",gap:5,marginBottom:10}}>
                  {DAYS.map(d=>(
                    <div key={d} style={{flex:1,textAlign:"center"}}>
                      <div style={{height:36,background:weights[d]?C.nutri:C.surface2,borderRadius:8,marginBottom:4,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${weights[d]?C.nutri:C.border}`}}>
                        {weights[d]&&<span style={{fontSize:8,color:"#fff",fontWeight:700}}>{weights[d]}</span>}
                      </div>
                      <div style={{fontSize:8,color:C.faint}}>{d}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:11,color:C.faint,marginBottom:12}}>Pesée le matin à jeun, mêmes conditions.</div>
                <button onClick={()=>{setSW(null);setW(()=>({}));}} style={ghostBtn}>↺ Réinitialiser</button>
              </>
            )}
          </Card>

          {/* Épargne */}
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:600}}>💎 Épargne du mois</div>
              <Tag color={C.epargne}>500 € / mois</Tag>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input type="number" placeholder="Montant épargné..." value={newSaving} onChange={e=>setNewSaving(e.target.value)} style={inputSt}/>
              <button onClick={()=>{if(newSaving){setSv(p=>({...p,saved:p.saved+parseFloat(newSaving)}));setNewSaving("");}}} style={btnSt(C.epargne)}>+ Add</button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
              <span style={{color:C.muted}}>Épargné</span><span style={{fontWeight:700,color:C.epargne}}>{savings.saved} €</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:12}}>
              <span style={{color:C.muted}}>Objectif</span><span style={{color:C.text}}>{savings.target} €</span>
            </div>
            <div style={{height:8,background:C.surface2,borderRadius:4,overflow:"hidden",marginBottom:8,border:`1px solid ${C.border}`}}>
              <div style={{height:"100%",width:`${Math.min(savings.saved/savings.target*100,100)}%`,background:`linear-gradient(90deg,${C.epargne},${C.good})`,borderRadius:4,transition:"width 0.5s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:C.faint}}>Reste : {Math.max(savings.target-savings.saved,0)} € · {Math.round(Math.min(savings.saved/savings.target*100,100))}%</span>
              <button onClick={()=>setSv(()=>({target:500,saved:0}))} style={ghostBtn}>↺ Nouveau mois</button>
            </div>
          </Card>
        </>)}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
